<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Sudoku</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <style>
        :root {
            --bg-page: #f8fafc;
            --bg-board: #ffffff;
            --grid-thick: #1e293b;
            --text-given: #0f172a;
            --text-input: #3b82f6;
            --text-error: #ef4444;
            --text-note: #94a3b8;
            --bg-selected: #bfdbfe;
            --bg-highlight: #eff6ff;
            --bg-given: #f1f5f9;
            --bg-success: #bbf7d0; 
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-page);
            margin: 0;
            padding: 15px;
            color: var(--text-given);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 420px;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            box-sizing: border-box;
        }
        .header-item { display: flex; flex-direction: column; align-items: center; }
        .header-label { font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;}
        .header-val { font-size: 16px; font-weight: 800; color: var(--text-given); margin-top: 2px;}

        select.header-select {
            border: none;
            background: transparent;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 800;
            color: var(--text-input);
            cursor: pointer;
            outline: none;
            padding: 0;
            text-align: center;
            appearance: none;
        }

        /* --- BOARD --- */
        #board-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        #board {
            display: grid;
            width: 100%;
            height: 100%;
            border: 3px solid var(--grid-thick);
            background-color: var(--grid-thick);
            gap: 1px; 
            box-sizing: border-box;
        }

        #board.size-9 { grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(9, 1fr); }
        .size-9 .cell:nth-child(3n) { border-right: 2px solid var(--grid-thick); }
        .size-9 .cell:nth-child(9n) { border-right: none; }
        .size-9 .cell:nth-child(n+19):nth-child(-n+27),
        .size-9 .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--grid-thick); }

        #board.size-6 { grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr); }
        .size-6 .cell:nth-child(3n) { border-right: 2px solid var(--grid-thick); }
        .size-6 .cell:nth-child(6n) { border-right: none; }
        .size-6 .cell:nth-child(n+7):nth-child(-n+12),
        .size-6 .cell:nth-child(n+19):nth-child(-n+24) { border-bottom: 2px solid var(--grid-thick); }

        /* --- CELLS & ANIMATIONS --- */
        .cell {
            background-color: var(--bg-board);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            position: relative;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .cell .value { animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .cell.given { color: var(--text-given); background-color: var(--bg-given); }
        .cell.input { color: var(--text-input); }
        .cell.error { color: var(--text-error); background-color: #fee2e2; }
        .cell.highlight { background-color: var(--bg-highlight); }
        .cell.selected { background-color: var(--bg-selected); }
        .cell.same-number { background-color: #dbeafe; }
        .cell.success-highlight { background-color: var(--bg-success) !important; transition: background-color 0.5s ease; }

        /* --- NOTES --- */
        .notes-grid {
            display: grid;
            width: 100%;
            height: 100%;
            padding: 2px;
            box-sizing: border-box;
        }
        .notes-size-9 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); }
        .notes-size-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .note-item {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-note);
        }

        /* --- OVERLAYS --- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #pause-screen, #game-over {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            animation: fadeIn 0.2s ease;
        }
        #game-over { position: fixed; background: rgba(15, 23, 42, 0.9); color: white; z-index: 100;}
        #pause-screen h2 { margin: 0 0 15px 0; color: var(--text-given); font-weight: 800;}
        #end-stats { font-size: 18px; text-align: center; color: #cbd5e1; margin-bottom: 25px; line-height: 1.6;}

        /* --- BUTTONS --- */
        .controls {
            margin-top: 25px;
            width: 100%;
            max-width: 420px;
        }
        .tools {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .tool-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: white;
            border: 2px solid transparent;
            padding: 10px 4px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: #475569;
            box-shadow: var(--shadow-sm);
            transition: all 0.1s ease;
        }
        .tool-btn .material-symbols-outlined { font-size: 22px; }
        .tool-btn:active { transform: scale(0.92); }
        .tool-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none;}

        /* Colored Tool Buttons */
        .btn-hint { color: #d97706; background: #fef3c7; border-color: #fde68a; }
        .btn-notes { color: #6d28d9; background: #ede9fe; border-color: #ddd6fe; }
        .btn-notes.active-mode { background: #6d28d9; color: white; border-color: #6d28d9; }
        .btn-clear { color: #be123c; background: #ffe4e6; border-color: #fecdd3; }
        .btn-pause { color: #0f766e; background: #ccfbf1; border-color: #99f6e4; }
        .btn-new { color: #15803d; background: #dcfce3; border-color: #bbf7d0; }
        .btn-primary { background: #3b82f6; color: white; padding: 12px 24px; font-size: 18px; border-radius: 20px; border: none; font-family: 'Nunito', sans-serif; font-weight: 800; cursor: pointer; transition: 0.2s;}
        .btn-primary:active { transform: scale(0.95); }

        /* Numpad */
        .numpad {
            display: grid;
            gap: 8px;
            margin-top: 20px;
        }
        .num-btn {
            background: white;
            border: none;
            font-family: 'Nunito', sans-serif;
            font-size: 30px;
            font-weight: 800;
            color: var(--text-input);
            cursor: pointer;
            padding: 12px 0;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            transition: all 0.1s ease;
        }
        .num-btn:hover { background-color: #eff6ff; transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .num-btn:active { transform: scale(0.92); box-shadow: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-item">
            <span class="header-label">Size</span>
            <select id="board-size" class="header-select">
                <option value="9">9x9</option>
                <option value="6">6x6</option>
            </select>
        </div>
        <div class="header-item">
            <span class="header-label">Difficulty</span>
            <select id="difficulty" class="header-select">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </div>
        <div class="header-item">
            <span class="header-label">Mistakes</span>
            <span class="header-val" id="mistake-counter">0</span>
        </div>
        <div class="header-item">
            <span class="header-label">Time</span>
            <span class="header-val" id="timer">00:00</span>
        </div>
    </div>

    <div id="board-wrapper">
        <div id="board"></div>
        <div id="pause-screen">
            <h2>Paused</h2>
            <button class="btn-primary" id="btn-resume">Resume Game</button>
        </div>
    </div>

    <div class="controls">
        <div class="tools">
            <button class="tool-btn btn-new" id="btn-new">
                <span class="material-symbols-outlined">add_circle</span>New
            </button>
            <button class="tool-btn btn-notes" id="btn-notes">
                <span class="material-symbols-outlined">edit</span>Notes
            </button>
            <button class="tool-btn" id="btn-undo">
                <span class="material-symbols-outlined">undo</span>Undo
            </button>
            <button class="tool-btn" id="btn-redo">
                <span class="material-symbols-outlined">redo</span>Redo
            </button>
        </div>
        <div class="tools">
            <button class="tool-btn" id="btn-reset">
                <span class="material-symbols-outlined">restart_alt</span>Reset
            </button>
            <button class="tool-btn btn-hint" id="btn-hint">
                <span class="material-symbols-outlined">lightbulb</span>Hint
            </button>
            <button class="tool-btn btn-pause" id="btn-pause">
                <span class="material-symbols-outlined">pause</span>Pause
            </button>
            <button class="tool-btn btn-clear" id="btn-clear">
                <span class="material-symbols-outlined">backspace</span>Clear
            </button>
        </div>
        <div class="numpad" id="numpad">
            </div>
    </div>

    <div id="game-over">
        <span class="material-symbols-outlined" style="font-size: 64px; color: var(--bg-success); margin-bottom: 10px;">emoji_events</span>
        <h2 style="margin-top:0;">Puzzle Solved!</h2>
        <div id="end-stats"></div>
        <button class="btn-primary" id="btn-play-again">Play Again</button>
    </div>

<script>
(() => {
    // --- STATE VARIABLES ---
    let gridSize = 9;
    let boxRows = 3;
    let boxCols = 3;

    let currentBoard = [];
    let solutionBoard = [];
    let initialBoard = [];
    let notesBoard = [];
    let selectedRow = null;
    let selectedCol = null;
    
    let mistakes = 0;
    let timerInterval = null;
    let seconds = 0;
    let isPaused = false;
    let notesMode = false;
    
    let undoStack = [];
    let redoStack = [];
    let activeSuccessCells = new Set(); 
    let hintedErrorCells = new Set(); 

    // DOM Elements
    const boardDiv = document.getElementById('board');
    const numpadDiv = document.getElementById('numpad');
    const mistakeSpan = document.getElementById('mistake-counter');
    const timerSpan = document.getElementById('timer');
    const gameOverScreen = document.getElementById('game-over');
    const endStats = document.getElementById('end-stats');
    const difficultySelect = document.getElementById('difficulty');
    const sizeSelect = document.getElementById('board-size');
    const pauseScreen = document.getElementById('pause-screen');
    const btnPause = document.getElementById('btn-pause');
    const btnResume = document.getElementById('btn-resume');
    const btnUndo = document.getElementById('btn-undo');
    const btnRedo = document.getElementById('btn-redo');
    const btnNotes = document.getElementById('btn-notes');

    // --- GENERATOR LOGIC ---
    function isValid(board, row, col, num) {
        for (let x = 0; x < gridSize; x++) {
            if (board[row][x] === num) return false;
            if (board[x][col] === num) return false;
        }
        let startRow = row - (row % boxRows);
        let startCol = col - (col % boxCols);
        for (let i = 0; i < boxRows; i++) {
            for (let j = 0; j < boxCols; j++) {
                if (board[i + startRow][j + startCol] === num) return false;
            }
        }
        return true;
    }

    function solve(board) {
        for (let row = 0; row < gridSize; row++) {
            for (let col = 0; col < gridSize; col++) {
                if (board[row][col] === 0) {
                    let nums = Array.from({length: gridSize}, (_, i) => i + 1).sort(() => Math.random() - 0.5); 
                    for (let num of nums) {
                        if (isValid(board, row, col, num)) {
                            board[row][col] = num;
                            if (solve(board)) return true;
                            board[row][col] = 0;
                        }
                    }
                    return false;
                }
            }
        }
        return true;
    }

    function countSolutions(board, limit = 2) {
        let count = 0;
        function solveCount(idx) {
            if (idx === gridSize * gridSize) { count++; return; }
            if (count >= limit) return;
            
            let r = Math.floor(idx / gridSize);
            let c = idx % gridSize;
            
            if (board[r][c] !== 0) { solveCount(idx + 1); return; }
            for (let num = 1; num <= gridSize; num++) {
                if (isValid(board, r, c, num)) {
                    board[r][c] = num;
                    solveCount(idx + 1);
                    board[r][c] = 0;
                }
            }
        }
        solveCount(0);
        return count;
    }

    function generatePuzzle(targetHoles) {
        let board = Array.from({length: gridSize}, () => Array(gridSize).fill(0));
        solve(board);
        let solution = JSON.parse(JSON.stringify(board)); 

        let positions = Array.from({length: gridSize * gridSize}, (_, i) => i).sort(() => Math.random() - 0.5);
        let holes = 0;

        for (let i = 0; i < positions.length; i++) {
            if (holes >= targetHoles) break;
            let r = Math.floor(positions[i] / gridSize);
            let c = positions[i] % gridSize;
            
            let temp = board[r][c];
            board[r][c] = 0;
            
            if (countSolutions(board, 2) === 1) {
                holes++;
            } else {
                board[r][c] = temp; 
            }
        }
        return { puzzle: board, solution: solution };
    }

    // --- SETUP EVENT LISTENERS ---
    function setupEventListeners() {
        btnUndo.addEventListener('click', undoMove);
        btnRedo.addEventListener('click', redoMove);
        document.getElementById('btn-hint').addEventListener('click', giveHint);
        btnNotes.addEventListener('click', toggleNotes);
        document.getElementById('btn-clear').addEventListener('click', clearCell);
        btnPause.addEventListener('click', togglePause);
        btnResume.addEventListener('click', togglePause);
        document.getElementById('btn-reset').addEventListener('click', resetBoard);
        document.getElementById('btn-new').addEventListener('click', startNewGame);
        difficultySelect.addEventListener('change', startNewGame);
        sizeSelect.addEventListener('change', startNewGame);
        document.getElementById('btn-play-again').addEventListener('click', startNewGame);

        document.addEventListener('keydown', (e) => {
            if (isPaused) return; 
            if (e.key >= '1' && e.key <= gridSize.toString()) inputNumber(parseInt(e.key));
            if (e.key === 'Backspace' || e.key === 'Delete') clearCell();
            
            if(selectedRow !== null && selectedCol !== null) {
                if(e.key === 'ArrowUp') selectCell(Math.max(0, selectedRow-1), selectedCol);
                if(e.key === 'ArrowDown') selectCell(Math.min(gridSize-1, selectedRow+1), selectedCol);
                if(e.key === 'ArrowLeft') selectCell(selectedRow, Math.max(0, selectedCol-1));
                if(e.key === 'ArrowRight') selectCell(selectedRow, Math.min(gridSize-1, selectedCol+1));
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && !isPaused && timerInterval) saveLocalState();
        });
    }

    function initUI() {
        gridSize = parseInt(sizeSelect.value);
        if (gridSize === 6) {
            boxRows = 2; boxCols = 3;
            boardDiv.className = 'size-6';
        } else {
            boxRows = 3; boxCols = 3;
            boardDiv.className = 'size-9';
        }

        boardDiv.innerHTML = '';
        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${r}-${c}`;
                cell.addEventListener('click', () => selectCell(r, c));
                boardDiv.appendChild(cell);
            }
        }
        
        numpadDiv.innerHTML = '';
        numpadDiv.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
        for (let i = 1; i <= gridSize; i++) {
            let btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.textContent = i;
            btn.addEventListener('click', () => inputNumber(i));
            numpadDiv.appendChild(btn);
        }
    }

    // --- LOCAL STORAGE LOGIC ---
    function saveLocalState() {
        if (solutionBoard.length === 0) return; 
        const state = {
            gridSize, boxRows, boxCols,
            currentBoard, solutionBoard, initialBoard, notesBoard,
            mistakes, seconds, notesMode,
            undoStack, redoStack,
            hintedErrorCells: Array.from(hintedErrorCells)
        };
        localStorage.setItem('sudokuAppSave', JSON.stringify(state));
    }

    function loadLocalState() {
        let saved = localStorage.getItem('sudokuAppSave');
        if (saved) {
            try {
                let state = JSON.parse(saved);
                gridSize = state.gridSize;
                boxRows = state.boxRows;
                boxCols = state.boxCols;
                currentBoard = state.currentBoard;
                solutionBoard = state.solutionBoard;
                initialBoard = state.initialBoard;
                notesBoard = state.notesBoard || Array.from({length: gridSize}, () => Array.from({length: gridSize}, () => []));
                mistakes = state.mistakes;
                seconds = state.seconds;
                notesMode = state.notesMode || false;
                undoStack = state.undoStack;
                redoStack = state.redoStack;
                hintedErrorCells = new Set(state.hintedErrorCells);
                
                sizeSelect.value = gridSize;
                
                btnNotes.innerHTML = notesMode ? '<span class="material-symbols-outlined">edit_off</span>Notes' : '<span class="material-symbols-outlined">edit</span>Notes';
                if (notesMode) btnNotes.classList.add('active-mode');
                else btnNotes.classList.remove('active-mode');

                initUI();
                mistakeSpan.textContent = mistakes;
                updateTimerDisplay();
                renderBoard(false);
                updateStackButtons();
                timerInterval = setInterval(updateTimer, 1000);
                return true;
            } catch (e) { return false; }
        }
        return false;
    }

    // --- HISTORY STACK LOGIC ---
    function saveState() {
        undoStack.push({ 
            board: JSON.parse(JSON.stringify(currentBoard)), 
            notes: JSON.parse(JSON.stringify(notesBoard)),
            mistakes: mistakes,
            errorCells: Array.from(hintedErrorCells) 
        });
        redoStack = []; 
        updateStackButtons();
    }

    function undoMove() {
        if (isPaused || undoStack.length === 0) return;
        redoStack.push({ board: JSON.parse(JSON.stringify(currentBoard)), notes: JSON.parse(JSON.stringify(notesBoard)), mistakes: mistakes, errorCells: Array.from(hintedErrorCells) });
        let prevState = undoStack.pop();
        currentBoard = prevState.board; notesBoard = prevState.notes; mistakes = prevState.mistakes; hintedErrorCells = new Set(prevState.errorCells);
        mistakeSpan.textContent = mistakes;
        renderBoard(false);
        updateStackButtons();
        saveLocalState();
    }

    function redoMove() {
        if (isPaused || redoStack.length === 0) return;
        undoStack.push({ board: JSON.parse(JSON.stringify(currentBoard)), notes: JSON.parse(JSON.stringify(notesBoard)), mistakes: mistakes, errorCells: Array.from(hintedErrorCells) });
        let nextState = redoStack.pop();
        currentBoard = nextState.board; notesBoard = nextState.notes; mistakes = nextState.mistakes; hintedErrorCells = new Set(nextState.errorCells);
        mistakeSpan.textContent = mistakes;
        renderBoard(false);
        updateStackButtons();
        saveLocalState();
    }

    function updateStackButtons() {
        btnUndo.disabled = undoStack.length === 0;
        btnRedo.disabled = redoStack.length === 0;
    }

    // --- GAME ACTIONS & RENDER LOGIC ---
    function toggleNotes() {
        notesMode = !notesMode;
        btnNotes.innerHTML = notesMode ? '<span class="material-symbols-outlined">edit_off</span>Notes' : '<span class="material-symbols-outlined">edit</span>Notes';
        if (notesMode) btnNotes.classList.add('active-mode');
        else btnNotes.classList.remove('active-mode');
        saveLocalState();
    }

    function renderBoard(animateCell = false) {
        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                let cell = document.getElementById(`cell-${r}-${c}`);
                cell.className = 'cell'; 
                cell.innerHTML = ''; 
                
                if (isPaused) continue;

                let val = currentBoard[r][c];
                if (val !== 0) {
                    let span = document.createElement('span');
                    span.textContent = val;
                    if(animateCell && r === selectedRow && c === selectedCol) span.className = 'value';
                    cell.appendChild(span);

                    if (initialBoard[r][c] !== 0) {
                        cell.classList.add('given');
                    } else {
                        cell.classList.add('input');
                        if (hintedErrorCells.has(`cell-${r}-${c}`)) cell.classList.add('error');
                    }
                } else {
                    let notes = notesBoard[r][c];
                    if (notes && notes.length > 0) {
                        let grid = document.createElement('div');
                        grid.className = `notes-grid notes-size-${gridSize}`;
                        for (let i = 1; i <= gridSize; i++) {
                            let n = document.createElement('div');
                            n.className = 'note-item';
                            if (notes.includes(i)) n.textContent = i;
                            grid.appendChild(n);
                        }
                        cell.appendChild(grid);
                    }
                }

                if (activeSuccessCells.has(`cell-${r}-${c}`)) cell.classList.add('success-highlight');
            }
        }
        if (!isPaused) applyHighlights();
    }

    function selectCell(r, c) {
        if (isPaused) return;
        selectedRow = r;
        selectedCol = c;
        renderBoard(false); 
    }

    function applyHighlights() {
        if (selectedRow === null || selectedCol === null) return;
        let selectedValue = currentBoard[selectedRow][selectedCol];

        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                let cell = document.getElementById(`cell-${r}-${c}`);
                let inBoxR = Math.floor(r / boxRows) === Math.floor(selectedRow / boxRows);
                let inBoxC = Math.floor(c / boxCols) === Math.floor(selectedCol / boxCols);
                
                if (r === selectedRow || c === selectedCol || (inBoxR && inBoxC)) cell.classList.add('highlight');
                if (selectedValue !== 0 && currentBoard[r][c] === selectedValue) cell.classList.add('same-number');
            }
        }
        document.getElementById(`cell-${selectedRow}-${selectedCol}`).classList.add('selected');
    }

    function autoClearNotes(r, c, num) {
        for(let i = 0; i < gridSize; i++) {
            if(notesBoard[r][i].includes(num)) notesBoard[r][i] = notesBoard[r][i].filter(n => n !== num);
            if(notesBoard[i][c].includes(num)) notesBoard[i][c] = notesBoard[i][c].filter(n => n !== num);
        }
        let startR = r - (r % boxRows);
        let startC = c - (c % boxCols);
        for (let i = 0; i < boxRows; i++) {
            for (let j = 0; j < boxCols; j++) {
                if(notesBoard[startR + i][startC + j].includes(num)) {
                    notesBoard[startR + i][startC + j] = notesBoard[startR + i][startC + j].filter(n => n !== num);
                }
            }
        }
    }

    function checkGroups(r, c) {
        let rowComplete = true, colComplete = true, blockComplete = true;

        for (let i = 0; i < gridSize; i++) {
            if (currentBoard[r][i] !== solutionBoard[r][i]) rowComplete = false;
            if (currentBoard[i][c] !== solutionBoard[i][c]) colComplete = false;
        }
        let startR = r - (r % boxRows);
        let startC = c - (c % boxCols);
        for (let i = 0; i < boxRows; i++) {
            for (let j = 0; j < boxCols; j++) {
                if (currentBoard[startR + i][startC + j] !== solutionBoard[startR + i][startC + j]) blockComplete = false;
            }
        }

        let toHighlight = [];
        if (rowComplete) for (let i = 0; i < gridSize; i++) toHighlight.push(`cell-${r}-${i}`);
        if (colComplete) for (let i = 0; i < gridSize; i++) toHighlight.push(`cell-${i}-${c}`);
        if (blockComplete) {
            for (let i = 0; i < boxRows; i++) {
                for (let j = 0; j < boxCols; j++) toHighlight.push(`cell-${startR + i}-${startC + j}`);
            }
        }

        if (toHighlight.length > 0) {
            toHighlight.forEach(id => activeSuccessCells.add(id));
            renderBoard(false); 
            setTimeout(() => {
                toHighlight.forEach(id => activeSuccessCells.delete(id));
                renderBoard(false); 
            }, 1000);
        }
    }

    function inputNumber(num) {
        if (isPaused || selectedRow === null || selectedCol === null) return;
        if (initialBoard[selectedRow][selectedCol] !== 0) return; 

        saveState();

        if (notesMode) {
            if (currentBoard[selectedRow][selectedCol] !== 0) { undoStack.pop(); return; }
            let notes = notesBoard[selectedRow][selectedCol];
            if (notes.includes(num)) notesBoard[selectedRow][selectedCol] = notes.filter(n => n !== num);
            else { notes.push(num); notes.sort((a,b) => a-b); }
            renderBoard(false);
            saveLocalState();
            return;
        }

        currentBoard[selectedRow][selectedCol] = num;
        notesBoard[selectedRow][selectedCol] = []; 
        hintedErrorCells.delete(`cell-${selectedRow}-${selectedCol}`);
        
        if (num !== solutionBoard[selectedRow][selectedCol]) {
            mistakes++;
            mistakeSpan.textContent = mistakes;
            renderBoard(true); 
        } else {
            autoClearNotes(selectedRow, selectedCol, num); 
            renderBoard(true); 
            checkGroups(selectedRow, selectedCol);
            checkWin();
        }
        saveLocalState();
    }

    function clearCell() {
        if (isPaused || selectedRow === null || selectedCol === null) return;
        if (initialBoard[selectedRow][selectedCol] !== 0) return;
        
        if (currentBoard[selectedRow][selectedCol] !== 0 || notesBoard[selectedRow][selectedCol].length > 0) {
            saveState();
            currentBoard[selectedRow][selectedCol] = 0;
            notesBoard[selectedRow][selectedCol] = [];
            hintedErrorCells.delete(`cell-${selectedRow}-${selectedCol}`);
            renderBoard(false);
            saveLocalState();
        }
    }

    function giveHint() {
        if (isPaused || selectedRow === null || selectedCol === null) return;
        let actionTaken = false;

        if (initialBoard[selectedRow][selectedCol] === 0 && currentBoard[selectedRow][selectedCol] !== solutionBoard[selectedRow][selectedCol]) {
            saveState(); 
            let correctNum = solutionBoard[selectedRow][selectedCol];
            currentBoard[selectedRow][selectedCol] = correctNum;
            notesBoard[selectedRow][selectedCol] = [];
            hintedErrorCells.delete(`cell-${selectedRow}-${selectedCol}`); 
            autoClearNotes(selectedRow, selectedCol, correctNum);
            actionTaken = true;
        }

        if (!actionTaken) {
            let startR = selectedRow - (selectedRow % boxRows);
            let startC = selectedCol - (selectedCol % boxCols);
            for (let i = 0; i < boxRows; i++) {
                for (let j = 0; j < boxCols; j++) {
                    let r = startR + i, c = startC + j;
                    if (currentBoard[r][c] !== 0 && currentBoard[r][c] !== solutionBoard[r][c]) {
                        if (!hintedErrorCells.has(`cell-${r}-${c}`)) {
                            saveState();
                            hintedErrorCells.add(`cell-${r}-${c}`);
                            actionTaken = true;
                            break; 
                        }
                    }
                }
                if (actionTaken) break; 
            }
        }

        if (actionTaken) {
            seconds += 10; 
            updateTimerDisplay(); 
            renderBoard(true); 
            checkGroups(selectedRow, selectedCol);
            checkWin();
            saveLocalState();
        }
    }

    // --- TIMER & SYSTEM ---
    function updateTimerDisplay() {
        let m = Math.floor(seconds / 60).toString().padStart(2, '0');
        let s = (seconds % 60).toString().padStart(2, '0');
        timerSpan.textContent = `${m}:${s}`;
    }

    function updateTimer() { seconds++; updateTimerDisplay(); }

    function togglePause() {
        if (gameOverScreen.style.display === 'flex') return; 

        isPaused = !isPaused;
        if (isPaused) {
            clearInterval(timerInterval);
            pauseScreen.style.display = 'flex';
            btnPause.innerHTML = '<span class="material-symbols-outlined">play_arrow</span>Resume';
            renderBoard(false); 
        } else {
            timerInterval = setInterval(updateTimer, 1000);
            pauseScreen.style.display = 'none';
            btnPause.innerHTML = '<span class="material-symbols-outlined">pause</span>Pause';
            renderBoard(false); 
        }
    }

    function resetBoard() {
        if (isPaused) return;
        saveState(); 
        mistakes = 0; mistakeSpan.textContent = mistakes;
        seconds = 0; updateTimerDisplay();
        hintedErrorCells.clear();
        currentBoard = JSON.parse(JSON.stringify(initialBoard)); 
        notesBoard = Array.from({length: gridSize}, () => Array.from({length: gridSize}, () => []));
        renderBoard(false);
        saveLocalState();
    }

    function checkWin() {
        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                if (currentBoard[r][c] !== solutionBoard[r][c]) return; 
            }
        }
        setTimeout(() => {
            clearInterval(timerInterval);
            localStorage.removeItem('sudokuAppSave'); 
            gameOverScreen.style.display = 'flex';
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            
            // Get dropdown display text
            let diffText = difficultySelect.options[difficultySelect.selectedIndex].text;
            let sizeText = sizeSelect.options[sizeSelect.selectedIndex].text;

            endStats.innerHTML = `
                Board Grid: <strong>${sizeText}</strong><br>
                Difficulty: <strong>${diffText}</strong><br><br>
                Time Consumed: <strong>${m}:${s}</strong><br>
                Total Mistakes: <strong>${mistakes}</strong>
            `;
        }, 600); 
    }

    function getHolesCount() {
        const diff = difficultySelect.value;
        const size = parseInt(sizeSelect.value);
        if (size === 9) {
            if (diff === 'easy') return 35;
            if (diff === 'medium') return 45;
            if (diff === 'high') return 55;
        } else {
            if (diff === 'easy') return 12; 
            if (diff === 'medium') return 18;
            if (diff === 'high') return 24;
        }
        return 35;
    }

    function newGame() {
        initUI(); 
        gameOverScreen.style.display = 'none';
        isPaused = false;
        pauseScreen.style.display = 'none';
        btnPause.innerHTML = '<span class="material-symbols-outlined">pause</span>Pause';
        
        activeSuccessCells.clear(); hintedErrorCells.clear();
        undoStack = []; redoStack = []; updateStackButtons();
        mistakes = 0; mistakeSpan.textContent = mistakes;
        seconds = 0; updateTimerDisplay();
        selectedRow = null; selectedCol = null;

        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(updateTimer, 1000);

        let data = generatePuzzle(getHolesCount()); 
        solutionBoard = data.solution; initialBoard = data.puzzle;
        currentBoard = JSON.parse(JSON.stringify(initialBoard)); 
        notesBoard = Array.from({length: gridSize}, () => Array.from({length: gridSize}, () => []));

        renderBoard(false);
        saveLocalState();
    }

    function startNewGame() { localStorage.removeItem('sudokuAppSave'); newGame(); }

    // --- INITIALIZE APPLICATION ---
    setupEventListeners();
    if (!loadLocalState()) newGame(); 

})(); 
</script>

</html>
